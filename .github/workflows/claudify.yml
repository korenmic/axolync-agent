name: claudify

on:
  push:
  pull_request:

jobs:
  claudify-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run claudify tests
        run: python -m unittest tests.test_claudify -v
